disabled_rules:
  - todo
  # Allow trailing commas in multi-line literals — aligns with swift-format and
  # Xcode 16 defaults, and produces cleaner diffs.
  - trailing_comma
opt_in_rules:
  - empty_count
  - force_unwrapping
  - explicit_init
  - closure_spacing
excluded:
  - Derived
  - .build
  - Tuist/.build
  - Generated
  - Frameworks
line_length:
  warning: 120
  error: 160
identifier_name:
  min_length: 2
